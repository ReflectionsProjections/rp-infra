name: Deploy Hermes

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-hermes.yml"
      - "README.md"

concurrency:
  group: deploy-hermes
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Build Hermes and trigger CodeDeploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out Hermes source
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.HERMES_REPOSITORY }}
          ref: ${{ vars.HERMES_REF }}
          path: hermes

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "yarn"
          cache-dependency-path: "hermes/yarn.lock"

      - name: Install Hermes dependencies
        working-directory: hermes
        run: yarn install --frozen-lockfile

      - name: Build Hermes dist
        working-directory: hermes
        run: yarn build

      - name: Prepare CodeDeploy bundle
        run: |
          mkdir -p bundle/scripts bundle/dist
          cp -R hermes/dist/. bundle/dist/
          cp hermes/package.json bundle/package.json
          cp hermes/yarn.lock bundle/yarn.lock
          cp hermes/appspec.yml bundle/appspec.yml
          cp hermes/ecosystem.config.cjs bundle/ecosystem.config.cjs
          cp hermes/scripts/*.sh bundle/scripts/
          chmod +x bundle/scripts/*.sh

      - name: Create deployment archive
        run: |
          cd bundle
          zip -r "../hermes-${GITHUB_SHA}.zip" .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload artifact bundle to S3
        run: aws s3 cp "hermes-${GITHUB_SHA}.zip" "s3://${{ vars.HERMES_CODEDEPLOY_BUCKET }}/hermes/hermes-${GITHUB_SHA}.zip"

      - name: Start CodeDeploy deployment
        id: deploy
        run: |
          DEPLOYMENT_ID="$(aws deploy create-deployment \
            --application-name "${{ vars.HERMES_CODEDEPLOY_APP_NAME }}" \
            --deployment-group-name "${{ vars.HERMES_CODEDEPLOY_DEPLOYMENT_GROUP }}" \
            --s3-location bucket="${{ vars.HERMES_CODEDEPLOY_BUCKET }}",key="hermes/hermes-${GITHUB_SHA}.zip",bundleType=zip \
            --description "rp-infra deploy of Hermes for ${GITHUB_SHA}" \
            --query "deploymentId" \
            --output text)"
          echo "deployment_id=${DEPLOYMENT_ID}" >> "${GITHUB_OUTPUT}"

      - name: Wait for deployment to succeed
        run: aws deploy wait deployment-successful --deployment-id "${{ steps.deploy.outputs.deployment_id }}"
